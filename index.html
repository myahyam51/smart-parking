<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Parking</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Smart Parking</h1>

    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Parking</a></li>
            <li><a href="#">Reservation</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>
</header>

<section class="hero">
    <h2>Find Your Parking Space Easily</h2>
    <p>Reserve your parking spot anytime, anywhere.</p>

    <button>Book Now</button>
</section>

<section class="parking">

    <h2>Parking Status</h2>

    <div class="card available">
        <h3>P1</h3>
        <p>Available</p>
    </div>

    <div class="card occupied">
        <h3>P2</h3>
        <p>Occupied</p>
    </div>

    <div class="card available">
        <h3>P3</h3>
        <p>Available</p>
    </div>

    <div class="card occupied">
        <h3>P4</h3>
        <p>Occupied</p>
    </div>

</section>

<footer>
    <p>© 2026 Smart Parking</p>
</footer>

</body>
</html>
